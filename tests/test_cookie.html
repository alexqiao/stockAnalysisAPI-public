<!DOCTYPE html>
<html>
<head>
    <title>测试Cookie函数</title>
</head>
<body>
    <h1>测试getCookie函数</h1>
    <div id="results"></div>

    <script>
    function getCookie(name) {
        const value = `; ${document.cookie}`;
        const parts = value.split(`; ${name}=`);
        if (parts.length === 2) {
            let cookieValue = parts.pop().split(';').shift();
            
            // 处理可能的引号包围
            if (cookieValue && cookieValue.startsWith('"') && cookieValue.endsWith('"')) {
                cookieValue = cookieValue.substring(1, cookieValue.length - 1);
            }
            
            // 如果cookie值包含"Bearer "前缀，去掉它
            if (cookieValue && cookieValue.startsWith('Bearer ')) {
                return cookieValue.substring(7); // 去掉"Bearer "前缀
            }
            return cookieValue;
        }
        return null;
    }

    // 设置测试cookie
    document.cookie = "access_token=\"Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiJjY3BwYWFwIiwiZXhwIjoxNzU2MzAxODY4fQ.***REMOVED***\"; path=/";
    
    // 测试获取cookie
    const token = getCookie('access_token');
    const resultsDiv = document.getElementById('results');
    
    resultsDiv.innerHTML = `
        <h2>测试结果:</h2>
        <p><strong>获取到的token:</strong> ${token ? token.substring(0, 20) + '...' : 'null'}</p>
        <p><strong>完整cookie:</strong> ${document.cookie}</p>
        <p><strong>测试状态:</strong> ${token ? '✅ 成功' : '❌ 失败'}</p>
    `;
    
    console.log("获取到的token:", token);
    </script>
</body>
</html>
