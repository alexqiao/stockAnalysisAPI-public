{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="text-center py-5">
            <h1 class="display-4 fw-bold text-primary mb-4">
                <i class="fas fa-chart-line"></i> Stock News Analyzer
            </h1>
            <p class="lead text-muted mb-5">
                AI驱动的股票新闻分析平台，为您提供实时的股票新闻分析和投资建议
            </p>
            
            <div class="row g-4 mb-5">
                <div class="col-md-4">
                    <div class="card h-100">
                        <div class="card-body text-center">
                            <i class="fas fa-newspaper fa-3x text-primary mb-3"></i>
                            <h5 class="card-title">实时新闻</h5>
                            <p class="card-text">获取最新的股票相关新闻和资讯</p>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card h-100">
                        <div class="card-body text-center">
                            <i class="fas fa-brain fa-3x text-primary mb-3"></i>
                            <h5 class="card-title">AI分析</h5>
                            <p class="card-text">基于AI的智能分析和投资建议</p>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card h-100">
                        <div class="card-body text-center">
                            <i class="fas fa-envelope fa-3x text-primary mb-3"></i>
                            <h5 class="card-title">邮件推送</h5>
                            <p class="card-text">每日定时推送分析报告到您的邮箱</p>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="d-grid gap-2 d-md-flex justify-content-center">
                <a href="/register" class="btn btn-primary btn-lg px-4 me-md-2">
                    <i class="fas fa-user-plus me-2"></i>立即注册
                </a>
                <a href="/login" class="btn btn-outline-primary btn-lg px-4">
                    <i class="fas fa-sign-in-alt me-2"></i>登录
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
